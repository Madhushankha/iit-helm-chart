ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: ans.dev.iit
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

